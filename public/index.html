<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lost & Found</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="app">

    <aside class="sidebar">
      <h1>Lost&Found</h1>

      <button onclick="showSection('reportSection', this)" class="nav-item active">Report Item</button>
      <button onclick="showSection('lostSection', this); loadLostReports();" class="nav-item">Lost Reports</button>
      <button onclick="showSection('foundSection', this); loadFoundItems();" class="nav-item">Found Items</button>
      <button onclick="showSection('searchSection', this)" class="nav-item">Search</button>
    </aside>

    <main class="main">

      <section id="reportSection" class="section">
        <h2>Report Item</h2>

        <select id="type">
          <option value="lost">Lost</option>
          <option value="found">Found</option>
        </select>

        <input id="title" placeholder="Title" />
        <input id="category" placeholder="Category" />
        <input id="location" placeholder="Location" />
        <input id="contact" placeholder="Email" />
        <textarea id="description" placeholder="Description"></textarea>

        <button onclick="submitItem()">Submit</button>

        <div id="matchNotification"></div>
        <pre id="reportResult"></pre>
      </section>

      <section id="lostSection" class="section hidden">
        <h2>Lost Items</h2>
        <div id="lostItemsList"></div>
      </section>

      <section id="foundSection" class="section hidden">
        <h2>Found Items</h2>
        <div id="foundItemsList"></div>
      </section>

      <section id="searchSection" class="section hidden">
        <h2>Search</h2>

        <input id="searchQuery" placeholder="Search..." />
        <select id="searchType">
          <option value="">All</option>
          <option value="lost">Lost</option>
          <option value="found">Found</option>
        </select>

        <button onclick="searchItems()">Search</button>

        <div id="itemsList"></div>
      </section>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
